name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: VideoDownloader.exe
          - os: macos-latest
            name: macOS
            artifact: VideoDownloader
          - os: ubuntu-latest
            name: Linux
            artifact: VideoDownloader

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev ffmpeg

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux extra
        if: runner.os == 'Linux'
        run: pip install pywebview[gtk] PyGObject

      - name: Install macOS extra
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit

      - name: Install Windows extra
        if: runner.os == 'Windows'
        run: pip install pythonnet

      - name: Generate icons
        run: python create_icon.py

      - name: Build
        run: python build.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.name }}" = "macOS" ]; then
            mv dist/VideoDownloader dist/VideoDownloader-macOS
          else
            mv dist/VideoDownloader dist/VideoDownloader-Linux
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-${{ matrix.name }}
          path: dist/VideoDownloader*

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/VideoDownloader-Windows/VideoDownloader.exe release/VideoDownloader-Windows.exe
          cp artifacts/VideoDownloader-macOS/VideoDownloader-macOS release/VideoDownloader-macOS
          cp artifacts/VideoDownloader-Linux/VideoDownloader-Linux release/VideoDownloader-Linux
          chmod +x release/VideoDownloader-macOS release/VideoDownloader-Linux

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update update.json
        run: |
          cat > update.json << EOF
          {
            "version": "${GITHUB_REF#refs/tags/v}",
            "download_url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}",
            "changelog": "Mise a jour ${{ steps.version.outputs.VERSION }}"
          }
          EOF
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add update.json
          git commit -m "Update version to ${{ steps.version.outputs.VERSION }}" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VideoDownloader ${{ steps.version.outputs.VERSION }}
          body: |
            ## VideoDownloader ${{ steps.version.outputs.VERSION }}

            ### Telechargement
            - **Windows** : `VideoDownloader-Windows.exe`
            - **macOS** : `VideoDownloader-macOS`
            - **Linux** : `VideoDownloader-Linux`

            ### Installation
            - **Windows** : Lancez le .exe directement
            - **macOS** : `chmod +x VideoDownloader-macOS && ./VideoDownloader-macOS`
            - **Linux** : `chmod +x VideoDownloader-Linux && ./VideoDownloader-Linux`
          files: |
            release/VideoDownloader-Windows.exe
            release/VideoDownloader-macOS
            release/VideoDownloader-Linux
