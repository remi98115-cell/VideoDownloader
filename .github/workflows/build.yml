name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: VideoDownloader.exe
          - os: macos-latest
            name: macOS
            artifact: VideoDownloader
          - os: ubuntu-latest
            name: Linux
            artifact: VideoDownloader

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev libgirepository-2.0-dev \
            gcc libcairo2-dev \
            pkg-config python3-dev ffmpeg

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux extra
        if: runner.os == 'Linux'
        run: pip install pywebview[gtk] PyGObject

      - name: Install macOS extra
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-WebKit

      - name: Install Windows extra
        if: runner.os == 'Windows'
        run: pip install pythonnet

      - name: Generate icons
        run: python create_icon.py

      - name: Build
        run: python build.py

      - name: Bundle FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist\ffmpeg
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath fftemp
          Get-ChildItem fftemp -Recurse -Filter "ffmpeg.exe" | Copy-Item -Destination dist\ffmpeg\
          Remove-Item fftemp, ffmpeg.zip -Recurse -Force
        shell: pwsh

      - name: Bundle FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/VideoDownloader.app/Contents/Resources/ffmpeg
          cp $(which ffmpeg) dist/VideoDownloader.app/Contents/Resources/ffmpeg/

      - name: Bundle FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/ffmpeg
          cp $(which ffmpeg) dist/ffmpeg/

      - name: Rename artifact (Linux)
        if: matrix.name == 'Linux'
        run: mv dist/VideoDownloader dist/VideoDownloader-Linux

      - name: Package macOS app
        if: matrix.name == 'macOS'
        run: |
          cd dist
          zip -r VideoDownloader-macOS.zip VideoDownloader.app

      - name: Package Windows with FFmpeg
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\VideoDownloader.exe, dist\ffmpeg -DestinationPath dist\VideoDownloader-Windows.zip
        shell: pwsh

      - name: Package Linux with FFmpeg
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf VideoDownloader-Linux.tar.gz VideoDownloader-Linux ffmpeg/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-${{ matrix.name }}
          path: |
            dist/VideoDownloader-Windows.zip
            dist/VideoDownloader-Linux.tar.gz
            dist/VideoDownloader-macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/VideoDownloader-Windows/VideoDownloader-Windows.zip release/
          cp artifacts/VideoDownloader-macOS/VideoDownloader-macOS.zip release/
          cp artifacts/VideoDownloader-Linux/VideoDownloader-Linux.tar.gz release/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update update.json
        run: |
          cat > update.json << EOF
          {
            "version": "${GITHUB_REF#refs/tags/v}",
            "download_url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}",
            "changelog": "Mise a jour ${{ steps.version.outputs.VERSION }}"
          }
          EOF
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add update.json
          git commit -m "Update version to ${{ steps.version.outputs.VERSION }}" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VideoDownloader ${{ steps.version.outputs.VERSION }}
          body: |
            ## VideoDownloader ${{ steps.version.outputs.VERSION }}

            ### Telechargement
            - **Windows** : `VideoDownloader-Windows.zip`
            - **macOS** : `VideoDownloader-macOS.zip`
            - **Linux** : `VideoDownloader-Linux.tar.gz`

            FFmpeg est inclus dans chaque version.
          files: |
            release/VideoDownloader-Windows.zip
            release/VideoDownloader-macOS.zip
            release/VideoDownloader-Linux.tar.gz
